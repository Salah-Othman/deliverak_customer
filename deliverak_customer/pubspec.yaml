name: deliverak_customer
description: "A new Flutter project."

publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: ^3.11.5


dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # باكدج الباكيند الأساسية
  supabase_flutter: ^2.16.0
  
  # لقراءة مفاتيح الربط بأمان من ملف خارجي لحماية البرودكشن
  flutter_dotenv: ^6.0.1
  
  # الـ State Management والـ DI والـ Routing اللي اتفقنا عليهم
  flutter_bloc: ^9.1.1
  go_router: ^17.3.0
  get_it: ^9.2.1

  # Local data source
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^9.2.4
  flutter_native_splash: ^2.4.7

dev_dependencies:

  flutter_test:
    sdk: flutter



  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:

  
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/

  

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21


flutter_native_splash:
  color: "#FFFFFF" # خلفية بيضاء شيك متناسقة مع اللوجو
  image: assets/icons/app_icon.png # مسار أيقونة السكوتر والدبوس بتاعتنا
  
  android_12:
    image: assets/icons/app_icon.png
    color: "#FFFFFF"
    
  fullscreen: false